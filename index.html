```html
<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FLAG RACE ASEAN</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ===================================== -->
    <!-- HEADER -->
    <!-- ===================================== -->

    <header class="header">

        <h1>🏁 FLAG RACE ASEAN 🏁</h1>

    </header>

    <!-- ===================================== -->
    <!-- INFO PANEL -->
    <!-- ===================================== -->

    <section class="info-panel">

        <div>
            <strong>Status :</strong>
            <span id="game-status">Idle</span>
        </div>

        <div>
            <strong>Connection :</strong>
            <span id="connection-status">Disconnected</span>
        </div>

        <div>
            <strong>Countdown :</strong>
            <span id="countdown">-</span>
        </div>

    </section>

    <!-- ===================================== -->
    <!-- GAME LAYOUT -->
    <!-- ===================================== -->

    <main class="game-layout">

        <!-- =============================== -->
        <!-- RACE AREA -->
        <!-- =============================== -->

        <section id="arena">

        </section>

        <!-- =============================== -->
        <!-- REALTIME LEADERBOARD -->
        <!-- =============================== -->

        <aside id="leaderboard">

            <div class="leaderboard-header">

                <h2>🏆 LEADERBOARD</h2>

            </div>

            <div id="leaderboard-body">

                <!-- dibuat otomatis oleh ui.js -->

            </div>

        </aside>

    </main>

    <!-- ===================================== -->
    <!-- CONTROL -->
    <!-- ===================================== -->

    <section class="controls">

        <button id="btn-start">START</button>

        <button id="btn-reset">RESET</button>

    </section>

    <!-- ===================================== -->
    <!-- WINNER -->
    <!-- ===================================== -->

    <section id="winner-popup" class="hidden">

        <h2>🏆 WINNER</h2>

        <h1 id="winner-name">-</h1>

    </section>

    <!-- ===================================== -->
    <!-- JAVASCRIPT -->
    <!-- ===================================== -->

    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/race.js"></script>
    <script src="js/gift.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/animation.js"></script>
    <script src="js/winner.js"></script>
    <script src="js/websocket.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
```
